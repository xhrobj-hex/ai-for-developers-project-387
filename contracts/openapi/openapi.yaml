openapi: 3.0.0
info:
  title: Calendar Booking API
  version: 0.0.0
tags: []
paths:
  /admin/bookings/upcoming:
    get:
      operationId: AdminBookings_listUpcoming
      description: Список предстоящих бронирований всех типов событий.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UpcomingBooking'
  /admin/event-types:
    post:
      operationId: AdminEventTypes_create
      description: Создает новый тип события в административной части.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventType'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventTypeRequest'
  /bookings:
    post:
      operationId: Bookings_create
      description: |-
        Создает бронирование на выбранный свободный слот.
        На одно и то же время нельзя создать две записи,
        даже если это разные типы событий.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotAlreadyBookedError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingRuleViolationError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
  /event-types:
    get:
      operationId: EventTypes_list
      description: Публичный список доступных типов событий.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventType'
  /event-types/{eventTypeId}/slots:
    get:
      operationId: EventTypes_listSlots
      description: |-
        Публичный список свободных слотов для выбранного типа события.
        Для MVP сервер возвращает окно записи на ближайшие 14 дней.
      parameters:
        - name: eventTypeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Slot'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
components:
  schemas:
    Booking:
      type: object
      required:
        - id
        - eventTypeId
        - startAt
        - endAt
        - createdAt
      properties:
        id:
          type: string
        eventTypeId:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      description: Бронирование выбранного слота.
    BookingRuleViolationError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - BOOKING_RULE_VIOLATION
        message:
          type: string
    CreateBookingRequest:
      type: object
      required:
        - eventTypeId
        - startAt
      properties:
        eventTypeId:
          type: string
        startAt:
          type: string
          format: date-time
      description: Входные данные для создания бронирования.
    CreateEventTypeRequest:
      type: object
      required:
        - name
        - description
        - durationMinutes
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        durationMinutes:
          type: integer
          format: int32
          minimum: 1
      description: Входные данные для создания типа события.
    EventType:
      type: object
      required:
        - id
        - name
        - description
        - durationMinutes
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        durationMinutes:
          type: integer
          format: int32
      description: Тип события, который создает владелец календаря.
    NotFoundError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
        message:
          type: string
    Owner:
      type: object
      required:
        - id
        - displayName
      properties:
        id:
          type: string
        displayName:
          type: string
      description: |-
        Доменная сущность владельца календаря.
        В MVP владелец один, заранее заданный, поэтому отдельного endpoint для него пока нет.
    Slot:
      type: object
      required:
        - eventTypeId
        - startAt
        - endAt
      properties:
        eventTypeId:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
      description: Свободный слот, который видит гость.
    SlotAlreadyBookedError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - SLOT_ALREADY_BOOKED
        message:
          type: string
    UpcomingBooking:
      type: object
      required:
        - id
        - eventTypeId
        - eventTypeName
        - eventTypeDescription
        - startAt
        - endAt
        - createdAt
      properties:
        id:
          type: string
        eventTypeId:
          type: string
        eventTypeName:
          type: string
        eventTypeDescription:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      description: Бронирование для страницы предстоящих встреч владельца.
    ValidationError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
        message:
          type: string
        details:
          type: array
          items:
            type: string
servers:
  - url: http://localhost:3000
    description: Local development
    variables: {}
